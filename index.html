:root {
  color-scheme: dark;
  --teal: #03dac6;
  --violet: #6200ea;
  --bg: #0e0e0e;
  --surface: #1a1a1a;
  --surface2: #242424;
  --text: #e8e8e8;
  --muted: #666;
}

html { background: #0e0e0e; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  overflow-x: hidden;
  padding: 16px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(3,218,198,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(3,218,198,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.container {
  position: relative;
  background: var(--surface);
  border: 1px solid rgba(3,218,198,0.12);
  border-radius: 4px;
  padding: 28px 20px 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 0 60px rgba(98,0,234,0.15), 0 0 0 1px rgba(3,218,198,0.06);
}

.container::before, .container::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--teal);
  border-style: solid;
}
.container::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

h1 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0.7;
}

.file-label {
  display: block;
  background: var(--surface2);
  border: 1px dashed rgba(3,218,198,0.25);
  border-radius: 3px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  text-align: center;
  margin-bottom: 16px;
}
.file-label:hover { border-color: var(--teal); color: var(--teal); }
#audio-upload { display: none; }

#status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  min-height: 14px;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#status.ok  { color: var(--teal); }
#status.err { color: #cf6679; }

canvas {
  display: block;
  margin: 16px auto 14px;
  background: #111;
  border-radius: 50%;
  width: min(300px, calc(100vw - 72px));
  height: min(300px, calc(100vw - 72px));
  border: 1px solid rgba(3,218,198,0.08);
  box-shadow: 0 0 40px rgba(98,0,234,0.2);
}

.timeline {
  width: 100%;
  margin: 4px 0 20px;
  display: block;
  accent-color: var(--teal);
  height: 4px;
  border-radius: 4px;
  cursor: pointer;
}

#play-button {
  display: block;
  width: 100%;
  padding: 13px;
  background: linear-gradient(90deg, var(--violet) 0%, #03dac6 100%);
  border: none;
  color: #fff;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 3px;
  transition: opacity 0.2s, transform 0.15s;
}
#play-button:hover { opacity: 0.88; transform: translateY(-1px); }
#play-button:active { transform: translateY(0); }

<body>
<div class="container">
  <h1>// AUDIO VISUALIZER</h1>

  <label class="file-label" for="audio-upload">
    ⊕ &nbsp;Upload audio file
  </label>
  <input type="file" id="audio-upload" accept="audio/*,.mp3,.wav,.m4a,.aac,.flac,.ogg,.opus">

  <div id="status">READY — NO FILE LOADED</div>

<canvas id="audio-visualizer"></canvas>
<input type="range" id="audio-timeline" min="0" value="0" step="0.01" class="timeline">
<button id="play-button">▶  PLAY</button>

</div>

<script>
const audioUpload = document.getElementById('audio-upload');
const playButton  = document.getElementById('play-button');
const canvas      = document.getElementById('audio-visualizer');
const timeline    = document.getElementById('audio-timeline');
const statusEl    = document.getElementById('status');
const ctx         = canvas.getContext('2d');

let audioContext, analyser, bufferLength, dataArray;
let isPlaying = false;
let audioElement = null;
let pendingObjectURL = null;
let pendingLabel = '';
let visualizerReady = false;
let animationFrameId;

function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = type;
}

// ── Full teardown ──────────────────────────────────────────────────────────
function teardown() {
  cancelAnimationFrame(animationFrameId);

  if (audioElement) {
    audioElement.pause();
    audioElement.src = '';
    audioElement = null;
  }
  if (audioContext) {
    audioContext.close().catch(() => {});
    audioContext = null;
  }
  if (pendingObjectURL) {
    URL.revokeObjectURL(pendingObjectURL);
    pendingObjectURL = null;
  }

  analyser = null;
  visualizerReady = false;
  isPlaying = false;
  playButton.textContent = '▶ \u00A0PLAY';
  timeline.value = 0;
  timeline.max = 1;
}

// ── File selected — just store it, don't touch AudioContext yet ────────────
// Safari requires AudioContext to be created inside a direct user gesture
// (i.e. a tap/click). File input change events don't always qualify on iOS,
// so we defer AudioContext creation until the play button is pressed.
audioUpload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  teardown();

  pendingObjectURL = URL.createObjectURL(file);
  pendingLabel = file.name.length > 48 ? file.name.slice(0, 45) + '…' : file.name;

  // Create the audio element now — just no AudioContext yet
  audioElement = new Audio();
  audioElement.src = pendingObjectURL;
  audioElement.preload = 'metadata';

  audioElement.addEventListener('loadedmetadata', () => {
    timeline.max = audioElement.duration;
    timeline.value = 0;
    setStatus(`READY: ${pendingLabel}`, 'ok');
  });

  audioElement.addEventListener('timeupdate', () => {
    if (audioElement && audioElement.duration) {
      timeline.max = audioElement.duration;
      timeline.value = audioElement.currentTime;
    }
  });

  audioElement.addEventListener('error', () => {
    setStatus('ERROR: Could not decode audio file', 'err');
    teardown();
  });

  audioElement.addEventListener('ended', () => {
    isPlaying = false;
    playButton.textContent = '▶ \u00A0PLAY';
    cancelAnimationFrame(animationFrameId);
  });

  setStatus(`READY: ${pendingLabel}`, 'ok');
});

// ── Play button — AudioContext created here, inside a real user gesture ────
playButton.addEventListener('click', () => {
  if (!audioElement) {
    setStatus('UPLOAD A FILE FIRST', 'err');
    return;
  }

  // First play: build AudioContext + analyser now, inside this click handler
  if (!visualizerReady) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaElementSource(audioElement);

      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);

      source.connect(analyser);
      analyser.connect(audioContext.destination);

      // Match canvas internal resolution to its CSS size
      const size = canvas.getBoundingClientRect();
      canvas.width  = size.width  || 300;
      canvas.height = size.height || 300;

      visualizerReady = true;
    } catch (err) {
      setStatus('ERROR: Web Audio setup failed', 'err');
      return;
    }
  }

  if (isPlaying) {
    audioElement.pause();
    isPlaying = false;
    playButton.textContent = '▶ \u00A0PLAY';
    cancelAnimationFrame(animationFrameId);
  } else {
    if (audioContext.state === 'suspended') audioContext.resume();
    audioElement.play().catch((err) => {
      setStatus(`ERROR: Playback failed — ${err.message}`, 'err');
    });
    isPlaying = true;
    playButton.textContent = '⏸ \u00A0PAUSE';
    drawVisualizer();
  }
});

// ── Seek ───────────────────────────────────────────────────────────────────
timeline.addEventListener('input', (e) => {
  if (audioElement && audioElement.duration) {
    audioElement.currentTime = parseFloat(e.target.value);
  }
});

// ── Draw ───────────────────────────────────────────────────────────────────
let rotationAngle = 0;
function drawVisualizer() {
  if (!isPlaying) return;
  animationFrameId = requestAnimationFrame(drawVisualizer);
  analyser.getByteFrequencyData(dataArray);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx    = canvas.width / 2;
  const cy    = canvas.height / 2;
  const scale = canvas.width / 300;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotationAngle);

  // Base disc
  ctx.beginPath();
  ctx.arc(0, 0, 100 * scale, 0, 2 * Math.PI);
  ctx.fillStyle = '#1a1a1a';
  ctx.shadowColor = '#03dac6';
  ctx.shadowBlur = 18;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Grooves
  for (let r = 68; r < 100; r += 6) {
    ctx.beginPath();
    ctx.arc(0, 0, r * scale, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(98,0,234,0.14)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(0, 0, 28 * scale, 0, 2 * Math.PI);
  ctx.fillStyle = '#03dac6';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, 9 * scale, 0, 2 * Math.PI);
  ctx.fillStyle = '#0e0e0e';
  ctx.fill();

  // Waveform ring (kept upright while disc spins)
  ctx.save();
  ctx.rotate(-rotationAngle);
  const radius = 100 * scale;
  const maxBar = 52 * scale;
  const numBars = Math.floor(bufferLength / 2.5);

  ctx.beginPath();
  for (let i = 0; i < numBars; i++) {
    const angle = (i / numBars) * 2 * Math.PI;
    let h = (dataArray[i] / 2.2) * scale;
    if (h > maxBar) h = maxBar;
    ctx.lineTo(Math.cos(angle) * (radius + h), Math.sin(angle) * (radius + h));
  }
  ctx.closePath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#03dac6';
  ctx.shadowColor = '#03dac6';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.restore();

  ctx.restore();
  rotationAngle += 0.012;
}
</script>

</body>
