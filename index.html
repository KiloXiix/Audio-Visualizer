:root {
  color-scheme: dark;
  --teal: #03dac6;
  --violet: #6200ea;
  --bg: #0e0e0e;
  --surface: #1a1a1a;
  --surface2: #242424;
  --text: #e8e8e8;
  --muted: #666;
}

html { background: #0e0e0e; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  overflow-x: hidden;
  padding: 16px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(3,218,198,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(3,218,198,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.container {
  position: relative;
  background: var(--surface);
  border: 1px solid rgba(3,218,198,0.12);
  border-radius: 4px;
  padding: 28px 20px 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 0 60px rgba(98,0,234,0.15), 0 0 0 1px rgba(3,218,198,0.06);
}

.container::before, .container::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--teal);
  border-style: solid;
}
.container::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

h1 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0.7;
}

.file-label {
  display: block;
  background: var(--surface2);
  border: 1px dashed rgba(3,218,198,0.25);
  border-radius: 3px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  text-align: center;
  margin-bottom: 16px;
}
.file-label:hover { border-color: var(--teal); color: var(--teal); }
#audio-upload { display: none; }

#status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  min-height: 14px;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#status.ok  { color: var(--teal); }
#status.err { color: #cf6679; }

canvas {
  display: block;
  margin: 16px auto 14px;
  background: #111;
  border-radius: 50%;
  width: min(300px, calc(100vw - 72px));
  height: min(300px, calc(100vw - 72px));
  border: 1px solid rgba(3,218,198,0.08);
  box-shadow: 0 0 40px rgba(98,0,234,0.2);
}

.timeline {
  width: 100%;
  margin: 4px 0 20px;
  display: block;
  accent-color: var(--teal);
  height: 4px;
  border-radius: 4px;
  cursor: pointer;
}

#play-button {
  display: block;
  width: 100%;
  padding: 13px;
  background: linear-gradient(90deg, var(--violet) 0%, #03dac6 100%);
  border: none;
  color: #fff;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 3px;
  transition: opacity 0.2s, transform 0.15s;
}
#play-button:hover { opacity: 0.88; transform: translateY(-1px); }
#play-button:active { transform: translateY(0); }

<body>
<div class="container">
  <h1>// AUDIO VISUALIZER</h1>

  <label class="file-label" for="audio-upload">
    ⊕ &nbsp;Upload audio file
  </label>
  <input type="file" id="audio-upload" accept=".mp3,.wav,.m4a,.aac,.flac,.ogg,.opus,.mp4,.caf">

  <div id="status">READY — NO FILE LOADED</div>

<canvas id="audio-visualizer"></canvas>
<input type="range" id="audio-timeline" min="0" value="0" step="0.01" class="timeline">
<button id="play-button">▶  PLAY</button>

</div>

<script>
const audioUpload = document.getElementById('audio-upload');
const playButton  = document.getElementById('play-button');
const canvas      = document.getElementById('audio-visualizer');
const timeline    = document.getElementById('audio-timeline');
const statusEl    = document.getElementById('status');
const ctx         = canvas.getContext('2d');

let audioContext  = null;
let analyser      = null;
let sourceNode    = null;   // BufferSourceNode currently playing
let audioBuffer   = null;   // decoded PCM buffer
let bufferLength, dataArray;

let isPlaying     = false;
let startTime     = 0;      // audioContext.currentTime when playback started
let pauseOffset   = 0;      // how far into the track we paused
let duration      = 0;

let animationFrameId;

// ── Status ─────────────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = type;
}

// ── Teardown ───────────────────────────────────────────────────────────────
function teardown() {
  cancelAnimationFrame(animationFrameId);
  stopSource();
  if (audioContext) { audioContext.close().catch(() => {}); audioContext = null; }
  analyser = null;
  audioBuffer = null;
  isPlaying = false;
  pauseOffset = 0;
  duration = 0;
  playButton.textContent = '▶ \u00A0PLAY';
  timeline.value = 0;
  timeline.max = 1;
}

function stopSource() {
  if (sourceNode) {
    try { sourceNode.stop(); } catch (_) {}
    sourceNode.disconnect();
    sourceNode = null;
  }
}

// ── File selected ──────────────────────────────────────────────────────────
audioUpload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  teardown();

  const label = file.name.length > 48 ? file.name.slice(0, 45) + '…' : file.name;
  setStatus('DECODING…');

  const reader = new FileReader();
  reader.onload = (ev) => {
    // AudioContext must exist to call decodeAudioData.
    // Create it now — file reader callback is close enough to the user
    // gesture on most browsers. If it fails we retry on play button click.
    ensureAudioContext();

    audioContext.decodeAudioData(
      ev.target.result,
      (buffer) => {
        audioBuffer = buffer;
        duration = buffer.duration;
        timeline.max = duration;
        timeline.value = 0;
        pauseOffset = 0;
        setStatus(`READY: ${label}`, 'ok');
      },
      (err) => {
        setStatus('ERROR: Could not decode file — try mp3 or m4a', 'err');
        console.error('decodeAudioData error:', err);
      }
    );
  };
  reader.onerror = () => setStatus('ERROR: Could not read file', 'err');
  reader.readAsArrayBuffer(file);
});

function ensureAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    analyser.connect(audioContext.destination);

    const size = canvas.getBoundingClientRect();
    canvas.width  = size.width  || 300;
    canvas.height = size.height || 300;
  }
}

// ── Play button ────────────────────────────────────────────────────────────
playButton.addEventListener('click', () => {
  if (!audioBuffer) {
    // AudioContext may have been blocked — retry decode is not possible here,
    // but we can at least ensure context exists for next file load.
    ensureAudioContext();
    setStatus('UPLOAD A FILE FIRST', 'err');
    return;
  }

  // Always ensure context is running (Safari suspends it aggressively)
  ensureAudioContext();
  if (audioContext.state === 'suspended') audioContext.resume();

  if (isPlaying) {
    // Pause: record offset and stop
    pauseOffset = audioContext.currentTime - startTime;
    stopSource();
    isPlaying = false;
    playButton.textContent = '▶ \u00A0PLAY';
    cancelAnimationFrame(animationFrameId);
  } else {
    // Play from pauseOffset
    playFrom(pauseOffset);
  }
});

function playFrom(offset) {
  stopSource();

  sourceNode = audioContext.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(analyser);

  sourceNode.onended = () => {
    // Only treat as natural end if we didn't manually stop
    if (isPlaying) {
      isPlaying = false;
      pauseOffset = 0;
      playButton.textContent = '▶ \u00A0PLAY';
      timeline.value = 0;
      cancelAnimationFrame(animationFrameId);
    }
  };

  startTime = audioContext.currentTime - offset;
  sourceNode.start(0, offset);
  isPlaying = true;
  playButton.textContent = '⏸ \u00A0PAUSE';
  drawVisualizer();
}

// ── Timeline display (rAF-driven since no timeupdate event on BufferSource) -
function updateTimeline() {
  if (!isPlaying || !duration) return;
  const current = audioContext.currentTime - startTime;
  timeline.value = Math.min(current, duration);
}

// ── Seek ───────────────────────────────────────────────────────────────────
timeline.addEventListener('input', (e) => {
  if (!audioBuffer) return;
  const seekTo = parseFloat(e.target.value);
  pauseOffset = seekTo;
  if (isPlaying) {
    playFrom(seekTo);
  }
});

// ── Draw ───────────────────────────────────────────────────────────────────
let rotationAngle = 0;
function drawVisualizer() {
  if (!isPlaying) return;
  animationFrameId = requestAnimationFrame(drawVisualizer);

  updateTimeline();
  analyser.getByteFrequencyData(dataArray);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx    = canvas.width / 2;
  const cy    = canvas.height / 2;
  const scale = canvas.width / 300;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotationAngle);

  // Base disc
  ctx.beginPath();
  ctx.arc(0, 0, 100 * scale, 0, 2 * Math.PI);
  ctx.fillStyle = '#1a1a1a';
  ctx.shadowColor = '#03dac6';
  ctx.shadowBlur = 18;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Grooves
  for (let r = 68; r < 100; r += 6) {
    ctx.beginPath();
    ctx.arc(0, 0, r * scale, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(98,0,234,0.14)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(0, 0, 28 * scale, 0, 2 * Math.PI);
  ctx.fillStyle = '#03dac6';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, 9 * scale, 0, 2 * Math.PI);
  ctx.fillStyle = '#0e0e0e';
  ctx.fill();

  // Waveform ring
  ctx.save();
  ctx.rotate(-rotationAngle);
  const radius = 100 * scale;
  const maxBar = 52 * scale;
  const numBars = Math.floor(bufferLength / 2.5);

  ctx.beginPath();
  for (let i = 0; i < numBars; i++) {
    const angle = (i / numBars) * 2 * Math.PI;
    let h = (dataArray[i] / 2.2) * scale;
    if (h > maxBar) h = maxBar;
    ctx.lineTo(Math.cos(angle) * (radius + h), Math.sin(angle) * (radius + h));
  }
  ctx.closePath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#03dac6';
  ctx.shadowColor = '#03dac6';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.restore();

  ctx.restore();
  rotationAngle += 0.012;
}
</script>

</body>
